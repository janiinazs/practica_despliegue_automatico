<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelería - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-pink-50 min-h-screen p-4 md:p-8 relative font-sans">
    
    <!-- Contenedor de Notificaciones -->
    <div id="toastContainer" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <div class="max-w-7xl mx-auto">
        <!-- Encabezado y Controles -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border-t-4 border-pink-400 flex flex-col lg:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-2">
                <span class="text-4xl">🍰</span> Panel de Administración
            </h1>
            <div class="flex flex-col sm:flex-row w-full lg:w-auto gap-3">
                <input type="text" id="searchInput" placeholder="🔍 Buscar pastel o sabor..." class="w-full sm:w-64 p-3 border border-pink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400 bg-pink-50 text-sm transition">
                <select id="sortSelect" class="w-full sm:w-48 p-3 border border-pink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400 bg-pink-50 text-sm text-gray-700 cursor-pointer">
                    <option value="default">Ordenar por...</option>
                    <option value="priceAsc">Precio: Menor a Mayor</option>
                    <option value="priceDesc">Precio: Mayor a Menor</option>
                    <option value="nameAsc">Nombre: A - Z</option>
                </select>
            </div>
        </div>

        <!-- NUEVO: Tarjetas de Estadísticas (Dashboard) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-pink-100 flex items-center gap-4">
                <div class="p-4 bg-pink-100 text-pink-600 rounded-full text-2xl">🎂</div>
                <div>
                    <p class="text-sm text-gray-500 font-bold uppercase">Total en Catálogo</p>
                    <p class="text-2xl font-black text-gray-800" id="statTotalCakes">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-pink-100 flex items-center gap-4">
                <div class="p-4 bg-blue-100 text-blue-600 rounded-full text-2xl">💰</div>
                <div>
                    <p class="text-sm text-gray-500 font-bold uppercase">Precio Promedio</p>
                    <p class="text-2xl font-black text-gray-800" id="statAvgPrice">$0.00</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-pink-100 flex items-center gap-4">
                <div class="p-4 bg-yellow-100 text-yellow-600 rounded-full text-2xl">⭐</div>
                <div>
                    <p class="text-sm text-gray-500 font-bold uppercase">Pastel más costoso</p>
                    <p class="text-2xl font-black text-gray-800" id="statMaxPrice">$0.00</p>
                </div>
            </div>
        </div>
        
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Columna Izquierda: Formulario -->
            <div class="lg:w-1/3">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 sticky top-8">
                    <h2 class="text-xl font-bold text-pink-600 mb-4 border-b pb-2">Añadir Nueva Creación</h2>
                    <form id="cakeForm" class="flex flex-col gap-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">Cód/ID</label>
                            <input type="text" id="id" class="mt-1 p-2 border rounded-lg w-full bg-gray-50 focus:bg-white focus:ring-2 focus:ring-pink-300 transition" required>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">Nombre</label>
                            <input type="text" id="name" placeholder="Ej: Red Velvet" class="mt-1 p-2 border rounded-lg w-full bg-gray-50 focus:bg-white focus:ring-2 focus:ring-pink-300 transition" required>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">Sabor/Relleno</label>
                            <input type="text" id="flavor" placeholder="Ej: Queso Crema" class="mt-1 p-2 border rounded-lg w-full bg-gray-50 focus:bg-white focus:ring-2 focus:ring-pink-300 transition" required>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">Precio ($)</label>
                            <input type="number" step="0.01" id="price" placeholder="0.00" class="mt-1 p-2 border rounded-lg w-full bg-gray-50 focus:bg-white focus:ring-2 focus:ring-pink-300 transition" required>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">URL de Imagen (Opcional)</label>
                            <input type="url" id="image" placeholder="https://ejemplo.com/foto.jpg" class="mt-1 p-2 border rounded-lg w-full bg-gray-50 focus:bg-white focus:ring-2 focus:ring-pink-300 transition">
                        </div>
                        <button type="submit" class="mt-2 bg-pink-500 text-white px-6 py-3 rounded-lg font-bold hover:bg-pink-600 hover:shadow-lg transition-all w-full flex justify-center items-center gap-2">
                            <span>+</span> Guardar Pastel
                        </button>
                    </form>
                </div>
            </div>

            <!-- Columna Derecha: Catálogo -->
            <div class="lg:w-2/3">
                <div id="cakesList" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <p class="text-gray-500">Cargando delicias...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allCakes = []; 

        // Sistema de Notificaciones
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-500' : 'bg-red-500';
            toast.className = `${bgColor} text-white px-6 py-3 rounded-lg shadow-lg font-semibold toast-enter`;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Obtener datos
        async function fetchCakes() {
            const res = await fetch('/cakes');
            allCakes = await res.json();
            applyFiltersAndSort(); // Aplicar filtros, ordenar y renderizar
        }

        // Actualizar Estadísticas del Dashboard
        function updateDashboardStats(cakes) {
            document.getElementById('statTotalCakes').innerText = cakes.length;
            
            if (cakes.length === 0) {
                document.getElementById('statAvgPrice').innerText = "$0.00";
                document.getElementById('statMaxPrice').innerText = "$0.00";
                return;
            }

            const totalSum = cakes.reduce((acc, cake) => acc + cake.price, 0);
            const avgPrice = totalSum / cakes.length;
            const maxPrice = Math.max(...cakes.map(c => c.price));

            document.getElementById('statAvgPrice').innerText = `$${avgPrice.toFixed(2)}`;
            document.getElementById('statMaxPrice').innerText = `$${maxPrice.toFixed(2)}`;
        }

        // Lógica unificada para Buscar y Ordenar
        function applyFiltersAndSort() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortOption = document.getElementById('sortSelect').value;

            // 1. Filtrar
            let processedCakes = allCakes.filter(cake => 
                cake.name.toLowerCase().includes(searchTerm) || 
                cake.flavor.toLowerCase().includes(searchTerm)
            );

            // 2. Ordenar
            if (sortOption === 'priceAsc') {
                processedCakes.sort((a, b) => a.price - b.price);
            } else if (sortOption === 'priceDesc') {
                processedCakes.sort((a, b) => b.price - a.price);
            } else if (sortOption === 'nameAsc') {
                processedCakes.sort((a, b) => a.name.localeCompare(b.name));
            }

            // 3. Renderizar y actualizar stats
            renderCakes(processedCakes);
            updateDashboardStats(processedCakes);
        }

        // Eventos para el buscador y el selector
        document.getElementById('searchInput').addEventListener('input', applyFiltersAndSort);
        document.getElementById('sortSelect').addEventListener('change', applyFiltersAndSort);

        // Renderizar en HTML
        function renderCakes(cakesToRender) {
            const list = document.getElementById('cakesList');
            list.innerHTML = '';
            
            if (cakesToRender.length === 0) {
                list.innerHTML = `
                    <div class="col-span-full bg-white p-8 rounded-xl shadow-sm text-center border border-dashed border-gray-300">
                        <p class="text-gray-500 text-lg">No se encontraron resultados.</p>
                    </div>`;
                return;
            }

            cakesToRender.forEach(cake => {
                const defaultImage = `https://ui-avatars.com/api/?name=${cake.name}&background=fbcfe8&color=be185d&size=400&font-size=0.3`;
                const imgUrl = cake.image || defaultImage;

                list.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-pink-100 overflow-hidden hover:shadow-xl transition-all duration-300 flex flex-col group">
                        <div class="h-48 overflow-hidden relative bg-gray-100">
                            <img src="${imgUrl}" alt="${cake.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='${defaultImage}'">
                            <span class="absolute top-3 left-3 bg-white/90 backdrop-blur text-pink-700 text-xs font-bold px-2 py-1 rounded shadow">Ref: ${cake.id}</span>
                        </div>
                        <div class="p-5 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="text-xl font-extrabold text-gray-800 line-clamp-1">${cake.name}</h3>
                                <p class="text-sm text-gray-500 mt-1 line-clamp-2">🍰 ${cake.flavor}</p>
                            </div>
                            <div class="flex justify-between items-end mt-4 pt-4 border-t border-gray-100">
                                <span class="text-2xl font-black text-pink-600">$${cake.price.toFixed(2)}</span>
                                <div class="flex gap-2">
                                    <button onclick="updatePrice('${cake.id}', '${cake.name}', ${cake.price})" class="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white p-2 rounded-lg transition" title="Editar Precio">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                    </button>
                                    <button onclick="deleteCake('${cake.id}')" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white p-2 rounded-lg transition" title="Eliminar">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function updatePrice(id, name, currentPrice) {
            const newPrice = prompt(`Nuevo precio para "${name}":`, currentPrice);
            if (newPrice !== null && !isNaN(newPrice) && newPrice.trim() !== '') {
                await fetch(`/cakes/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ price: parseFloat(newPrice) })
                });
                showToast('Precio actualizado', 'success');
                fetchCakes(); 
            }
        }

        document.getElementById('cakeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newCake = {
                id: document.getElementById('id').value,
                name: document.getElementById('name').value,
                flavor: document.getElementById('flavor').value,
                price: parseFloat(document.getElementById('price').value),
                image: document.getElementById('image').value
            };

            const response = await fetch('/cakes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newCake)
            });

            if(response.ok) {
                showToast('¡Pastel guardado!', 'success');
                e.target.reset();
                fetchCakes(); 
            } else {
                showToast('Error: El ID ya existe', 'error');
            }
        });

        async function deleteCake(id) {
            if (confirm('¿Retirar pastel del catálogo?')) {
                await fetch(`/cakes/${id}`, { method: 'DELETE' });
                showToast('Pastel eliminado', 'error');
                fetchCakes(); 
            }
        }

        fetchCakes();
    </script>
</body>
</html>

                            </button>

                            <button onclick="deleteCake('${cake.id}')" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded transition" title="Eliminar Pastel">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // NUEVO: Lógica del buscador en tiempo real
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredCakes = allCakes.filter(cake => 
                cake.name.toLowerCase().includes(searchTerm) || 
                cake.flavor.toLowerCase().includes(searchTerm)
            );
            renderCakes(filteredCakes);
        });

        // NUEVO: Lógica para actualizar el precio
        async function updatePrice(id, name, currentPrice) {
            const newPrice = prompt(`Ingresa el nuevo precio para "${name}":`, currentPrice);
            
            // Validamos que el usuario haya escrito algo y sea un número válido
            if (newPrice !== null && !isNaN(newPrice) && newPrice.trim() !== '') {
                await fetch(`/cakes/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ price: parseFloat(newPrice) })
                });
                fetchCakes(); // Recargar la lista tras actualizar
            }
        }

        // Lógica para crear
        document.getElementById('cakeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newCake = {
                id: document.getElementById('id').value,
                name: document.getElementById('name').value,
                flavor: document.getElementById('flavor').value,
                price: parseFloat(document.getElementById('price').value)
            };

            await fetch('/cakes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newCake)
            });

            e.target.reset();
            fetchCakes(); 
        });

        // Lógica para eliminar
        async function deleteCake(id) {
            if (confirm('¿Retirar este pastel del catálogo?')) {
                await fetch(`/cakes/${id}`, { method: 'DELETE' });
                fetchCakes(); 
            }
        }

        // Cargar todo al inicio
        fetchCakes();
    </script>
</body>
</html>

            const cakes = await res.json();
            const list = document.getElementById('cakesList');
            list.innerHTML = '';
            
            if (cakes.length === 0) {
                list.innerHTML = '<p class="text-gray-500 col-span-2">No hay pasteles registrados.</p>';
                return;
            }

            cakes.forEach(cake => {
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition">
                        <div>
                            <p class="font-bold text-lg text-gray-800">${cake.name} <span class="text-pink-600 text-sm ml-2">$${cake.price}</span></p>
                            <p class="text-sm text-gray-500">${cake.flavor} (Ref: ${cake.id})</p>
                        </div>
                        <button onclick="deleteCake('${cake.id}')" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded transition">

                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newCake)
            });

            e.target.reset();
            fetchCakes(); 
        });

        async function deleteCake(id) {
            if (confirm('¿Retirar este pastel del catálogo?')) {
