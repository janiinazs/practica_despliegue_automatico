<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelería - Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden p-6 border-t-4 border-pink-400">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-2">🎂 Menú de Pasteles</h1>
        
        <!-- Formulario -->
        <div class="mb-8 bg-pink-50 p-5 rounded-lg border border-pink-200 shadow-inner">
            <h2 class="text-lg font-semibold text-pink-700 mb-4">Registrar Nuevo Pastel</h2>
            <form id="cakeForm" class="flex flex-wrap gap-4 items-end">
                <div class="w-24">
                    <label class="text-sm text-gray-600 block mb-1">Cód/ID</label>
                    <input type="text" id="id" class="p-2 border rounded w-full focus:ring-2 focus:ring-pink-300" required>
                </div>
                <div class="flex-1">
                    <label class="text-sm text-gray-600 block mb-1">Nombre</label>
                    <input type="text" id="name" placeholder="Ej: Tres Leches" class="p-2 border rounded w-full focus:ring-2 focus:ring-pink-300" required>
                </div>
                <div class="flex-1">
                    <label class="text-sm text-gray-600 block mb-1">Sabor/Relleno</label>
                    <input type="text" id="flavor" placeholder="Ej: Vainilla y Manjar" class="p-2 border rounded w-full focus:ring-2 focus:ring-pink-300" required>
                </div>
                <div class="w-24">
                    <label class="text-sm text-gray-600 block mb-1">Precio ($)</label>
                    <input type="number" step="0.01" id="price" placeholder="0.00" class="p-2 border rounded w-full focus:ring-2 focus:ring-pink-300" required>
                </div>
                <button type="submit" class="bg-pink-500 text-white px-6 py-2 rounded font-bold hover:bg-pink-600 transition shadow-md h-[42px]">Añadir</button>
            </form>
        </div>

        <!-- Catálogo y Buscador -->
        <div>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-gray-700">Catálogo Disponible</h2>
                <!-- NUEVO: Barra de Búsqueda -->
                <div class="w-1/2">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre o sabor..." class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300">
                </div>
            </div>
            
            <div id="cakesList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-500">Cargando pasteles...</p>
            </div>
        </div>
    </div>

    <script>
        let allCakes = []; // Guardamos los pasteles en memoria para poder filtrarlos

        // Obtener todos los pasteles del backend
        async function fetchCakes() {
            const res = await fetch('/cakes');
            allCakes = await res.json();
            renderCakes(allCakes);
        }

        // Dibujar los pasteles en el HTML
        function renderCakes(cakesToRender) {
            const list = document.getElementById('cakesList');
            list.innerHTML = '';
            
            if (cakesToRender.length === 0) {
                list.innerHTML = '<p class="text-gray-500 col-span-2">No se encontraron pasteles.</p>';
                return;
            }

            cakesToRender.forEach(cake => {
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition">
                        <div>
                            <p class="font-bold text-lg text-gray-800">${cake.name} <span class="text-pink-600 text-sm ml-2">$${cake.price.toFixed(2)}</span></p>
                            <p class="text-sm text-gray-500">${cake.flavor} (Ref: ${cake.id})</p>
                        </div>
                        <div class="flex gap-2">
                            <!-- NUEVO: Botón de Editar Precio -->
                            <button onclick="updatePrice('${cake.id}', '${cake.name}', ${cake.price})" class="text-blue-400 hover:text-blue-600 hover:bg-blue-50 p-2 rounded transition" title="Editar Precio">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                            </button>
                            <!-- Botón de Eliminar -->
                            <button onclick="deleteCake('${cake.id}')" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded transition" title="Eliminar Pastel">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // NUEVO: Lógica del buscador en tiempo real
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredCakes = allCakes.filter(cake => 
                cake.name.toLowerCase().includes(searchTerm) || 
                cake.flavor.toLowerCase().includes(searchTerm)
            );
            renderCakes(filteredCakes);
        });

        // NUEVO: Lógica para actualizar el precio
        async function updatePrice(id, name, currentPrice) {
            const newPrice = prompt(`Ingresa el nuevo precio para "${name}":`, currentPrice);
            
            // Validamos que el usuario haya escrito algo y sea un número válido
            if (newPrice !== null && !isNaN(newPrice) && newPrice.trim() !== '') {
                await fetch(`/cakes/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ price: parseFloat(newPrice) })
                });
                fetchCakes(); // Recargar la lista tras actualizar
            }
        }

        // Lógica para crear
        document.getElementById('cakeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newCake = {
                id: document.getElementById('id').value,
                name: document.getElementById('name').value,
                flavor: document.getElementById('flavor').value,
                price: parseFloat(document.getElementById('price').value)
            };

            await fetch('/cakes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newCake)
            });

            e.target.reset();
            fetchCakes(); 
        });

        // Lógica para eliminar
        async function deleteCake(id) {
            if (confirm('¿Retirar este pastel del catálogo?')) {
                await fetch(`/cakes/${id}`, { method: 'DELETE' });
                fetchCakes(); 
            }
        }

        // Cargar todo al inicio
        fetchCakes();
    </script>
</body>
</html>
        <!-- Lista -->
        <div>
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Catálogo Disponible</h2>
            <div id="cakesList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-500">Cargando pasteles...</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchCakes() {
            const res = await fetch('/cakes');
            const cakes = await res.json();
            const list = document.getElementById('cakesList');
            list.innerHTML = '';
            
            if (cakes.length === 0) {
                list.innerHTML = '<p class="text-gray-500 col-span-2">No hay pasteles registrados.</p>';
                return;
            }

            cakes.forEach(cake => {
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white border border-gray-100 rounded-lg shadow-sm hover:shadow-md transition">
                        <div>
                            <p class="font-bold text-lg text-gray-800">${cake.name} <span class="text-pink-600 text-sm ml-2">$${cake.price}</span></p>
                            <p class="text-sm text-gray-500">${cake.flavor} (Ref: ${cake.id})</p>
                        </div>
                        <button onclick="deleteCake('${cake.id}')" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                `;
            });
        }

        document.getElementById('cakeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newCake = {
                id: document.getElementById('id').value,
                name: document.getElementById('name').value,
                flavor: document.getElementById('flavor').value,
                price: parseFloat(document.getElementById('price').value)
            };

            await fetch('/cakes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newCake)
            });

            e.target.reset();
            fetchCakes(); 
        });

        async function deleteCake(id) {
            if (confirm('¿Retirar este pastel del catálogo?')) {
                await fetch(`/cakes/${id}`, { method: 'DELETE' });
                fetchCakes(); 
            }
        }

        fetchCakes();
    </script>
</body>
</html>
